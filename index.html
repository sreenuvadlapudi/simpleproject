<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Workspace</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Workspace navigation">
      <div class="workspace-switcher">
        <div class="workspace-mark" aria-hidden="true">F</div>
        <div class="workspace-copy">
          <strong>Focus Workspace</strong>
          <span>Personal pages</span>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="nav-action primary" id="newPageBtn" type="button">New page</button>
        <button class="nav-action" id="commandBtn" type="button">
          Command menu
          <kbd>Ctrl K</kbd>
        </button>
      </div>

      <section class="sidebar-section" aria-labelledby="favoritesLabel">
        <div class="section-title" id="favoritesLabel">Favorites</div>
        <div class="page-stack" id="favoriteList"></div>
      </section>

      <section class="sidebar-section pages-section" aria-labelledby="pagesLabel">
        <div class="section-title with-action">
          <span id="pagesLabel">Pages</span>
          <button class="icon-button" id="addPageMiniBtn" type="button" aria-label="Add page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
        </div>
        <nav class="page-stack" id="pageList"></nav>
      </section>

      <div class="sidebar-footer">
        <div>
          <span class="mini-label">Workspace</span>
          <strong id="workspaceCount">0 pages</strong>
        </div>
        <div class="mini-progress" aria-hidden="true">
          <span id="sidebarProgress"></span>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <button class="icon-button menu-button" id="menuBtn" type="button" aria-label="Open navigation">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <div class="breadcrumbs" id="breadcrumbs">Focus Workspace</div>
        <div class="topbar-actions">
          <label class="search-field">
            <span class="sr-only">Search tasks</span>
            <input id="taskSearchInput" type="search" placeholder="Search workspace">
          </label>
          <button class="toolbar-button" id="themeToggle" type="button">Dark</button>
        </div>
      </header>

      <div class="workspace-grid">
        <article class="editor-panel" aria-labelledby="pageTitle">
          <div class="page-toolbar">
            <div>
              <span class="mini-label">Document</span>
              <span id="pageUpdated">Autosaved</span>
            </div>
            <div class="page-toolbar-actions">
              <button class="toolbar-button" id="favoriteBtn" type="button">Star</button>
              <button class="toolbar-button danger subtle" id="deletePageBtn" type="button">Delete</button>
            </div>
          </div>

          <input class="page-title-input" id="pageTitle" type="text" aria-label="Page title">
          <div class="block-list" id="blockList"></div>

          <div class="block-composer">
            <div class="composer-input-wrap">
              <input id="blockInput" type="text" placeholder="Type / for blocks">
              <div class="slash-menu hidden" id="slashMenu"></div>
            </div>
            <button class="toolbar-button strong" id="addBlockBtn" type="button">Add block</button>
          </div>
        </article>

        <aside class="database-panel" aria-labelledby="databaseTitle">
          <div class="database-header">
            <div>
              <span class="mini-label">Database</span>
              <h2 id="databaseTitle">Tasks</h2>
              <p id="taskSummary">0 tasks</p>
            </div>
            <button class="toolbar-button strong" id="newTaskToggle" type="button">Add task</button>
          </div>

          <div class="database-controls">
            <label>
              <span>Status</span>
              <select id="statusFilter">
                <option value="all">All tasks</option>
                <option value="Backlog">Backlog</option>
                <option value="In progress">In progress</option>
                <option value="Done">Done</option>
              </select>
            </label>

            <div class="segmented" role="tablist" aria-label="Task view">
              <button class="segment active" data-view="table" type="button" role="tab">Table</button>
              <button class="segment" data-view="board" type="button" role="tab">Board</button>
            </div>
          </div>

          <form class="task-form hidden" id="taskForm">
            <input id="taskTitle" type="text" placeholder="Task name">
            <div class="task-form-grid">
              <select id="taskStatus" aria-label="Task status">
                <option>Backlog</option>
                <option>In progress</option>
                <option>Done</option>
              </select>
              <select id="taskPriority" aria-label="Task priority">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
              </select>
              <input id="taskDue" type="date" aria-label="Task due date">
              <select id="taskPage" aria-label="Linked page"></select>
            </div>
            <textarea id="taskNotes" rows="3" placeholder="Notes"></textarea>
            <div class="form-actions">
              <button class="toolbar-button" id="cancelTaskBtn" type="button">Cancel</button>
              <button class="toolbar-button strong" type="submit">Save task</button>
            </div>
          </form>

          <div class="task-table" id="taskTable"></div>
          <div class="task-board hidden" id="taskBoard"></div>
        </aside>
      </div>
    </main>
  </div>

  <div class="command-overlay hidden" id="commandOverlay" role="dialog" aria-modal="true" aria-labelledby="commandTitle">
    <div class="command-panel">
      <h2 id="commandTitle">Command menu</h2>
      <input id="commandSearch" type="search" placeholder="Search commands">
      <div class="command-list" id="commandList"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
